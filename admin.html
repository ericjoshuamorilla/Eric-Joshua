<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU – Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Google Identity Services -->
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --primary:#3960AB; --primary-light:rgba(57,96,171,.1); --primary-fg:#fff;
      --accent:#3CC2DD; --accent-light:rgba(60,194,221,.12);
      --bg:#F8FAFC; --card:#fff; --border:#e2e8f0; --border2:#f1f5f9;
      --text:#0f172a; --muted:#64748b; --muted-bg:#f1f5f9;
      --destructive:#ef4444; --dest-light:rgba(239,68,68,.08);
      --success:#10b981; --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(57,96,171,.06);
    }
    html,body{height:100%;font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);}
    button,input,select{font-family:inherit;}
    a{text-decoration:none;color:inherit;}
    ::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

    /* ── LOGIN ── */
    #loginScreen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;}
    .login-card{background:var(--card);border-radius:24px;padding:40px 44px;box-shadow:0 8px 40px rgba(57,96,171,.14);width:100%;max-width:380px;text-align:center;}
    .login-badge{width:56px;height:56px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;margin:0 auto 18px;box-shadow:0 4px 16px rgba(57,96,171,.35);}
    .login-card h1{font-size:26px;font-weight:700;letter-spacing:-1px;margin-bottom:4px;}
    .login-card>p{font-size:13px;color:var(--muted);margin-bottom:28px;}
    .login-field{width:100%;padding:12px 14px;background:var(--muted-bg);border:2px solid transparent;border-radius:10px;font-size:14px;color:var(--text);outline:none;margin-bottom:10px;transition:.2s;}
    .login-field:focus{background:#eef2ff;border-color:var(--primary);}
    .btn-login{width:100%;padding:13px;background:var(--primary);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-bottom:8px;}
    .btn-login:hover{background:#2d4f91;box-shadow:0 4px 16px rgba(57,96,171,.35);}
    .login-err{font-size:12px;color:var(--destructive);display:none;margin-bottom:4px;}
    .login-hint{font-size:11px;color:var(--muted);}

    /* ── LOADING STATES ── */
    #loginLoading{display:none;align-items:center;justify-content:center;gap:8px;color:#64748b;font-size:12px;padding:14px 0;margin-top:8px;}
    #loginLoading.show{display:flex;}
    .spinner{width:15px;height:15px;border:2.5px solid rgba(57,96,171,.2);border-top-color:#3960AB;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── APP LAYOUT ── */
    #app{display:none;height:100vh;}
    #app.show{display:flex;}
    .sidebar{width:240px;border-right:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;flex-shrink:0;}
    .sb-logo{padding:24px 20px 18px;border-bottom:1px solid var(--border2);}
    .sb-logo a{display:flex;align-items:center;gap:10px;color:var(--primary);font-size:22px;font-weight:700;letter-spacing:-1px;}
    .sb-logo-icon{width:38px;height:38px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
    .sb-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:3px;}
    .sb-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:10px;background:transparent;border:none;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;transition:.2s;text-align:left;}
    .sb-btn:hover{background:var(--muted-bg);color:var(--text);}
    .sb-btn.active{background:var(--primary-light);color:var(--primary);font-weight:600;}
    .sb-btn svg{width:18px;height:18px;flex-shrink:0;}
    .sb-footer{padding:14px 12px;border-top:1px solid var(--border2);}
    .sb-user{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:12px;}
    .sb-ava{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0;}
    .sb-uname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sb-uemail{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .btn-logout{background:transparent;border:none;padding:7px;border-radius:8px;color:var(--muted);cursor:pointer;transition:.2s;flex-shrink:0;}
    .btn-logout:hover{color:var(--destructive);background:var(--dest-light);}
    .btn-logout svg{width:16px;height:16px;}

    /* ── MAIN ── */
    .main{flex:1;overflow:auto;}
    .section{padding:32px;display:none;}
    .section.active{display:block;}

    /* section header */
    .sec-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
    .sec-hd h1{font-size:26px;font-weight:700;letter-spacing:-1px;}
    .sec-hd p{font-size:13px;color:var(--muted);margin-top:2px;}
    .sec-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

    /* buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:13px;font-weight:600;border-radius:50px;padding:9px 18px;cursor:pointer;transition:.2s;border:none;}
    .btn-primary{background:var(--primary);color:#fff;}
    .btn-primary:hover{background:#2d4f91;box-shadow:0 4px 14px rgba(57,96,171,.35);}
    .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--muted);}
    .btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
    .btn-sm{font-size:12px;padding:6px 14px;}
    .btn svg{width:15px;height:15px;}

    /* filter bar */
    .filter-bar{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
    .filter-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:4px;}
    .fsel-wrap{position:relative;}
    .fsel{padding:7px 30px 7px 12px;background:var(--muted-bg);border:1.5px solid transparent;border-radius:8px;font-family:inherit;font-size:13px;color:var(--text);appearance:none;cursor:pointer;outline:none;transition:.2s;}
    .fsel:focus{border-color:var(--primary);background:#eef2ff;}
    .fsel-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;width:12px;height:12px;color:var(--muted);}
    .date-in{padding:7px 12px;background:var(--muted-bg);border:1.5px solid transparent;border-radius:8px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:.2s;}
    .date-in:focus{border-color:var(--primary);background:#eef2ff;}
    .custom-date{display:none;align-items:center;gap:8px;}
    .custom-date.show{display:flex;}
    .fspace{flex:1;}

    /* stat cards */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:24px;}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);}
    .stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .stat-label{font-size:12px;font-weight:500;color:var(--muted);}
    .stat-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;}
    .stat-icon.blue{background:var(--primary-light);}
    .stat-icon.teal{background:var(--accent-light);}
    .stat-icon svg{width:17px;height:17px;}
    .stat-icon.blue svg{color:var(--primary);}
    .stat-icon.teal svg{color:var(--accent);}
    .stat-val{font-size:28px;font-weight:700;letter-spacing:-1px;}
    .stat-sub{font-size:11px;color:var(--muted);margin-top:2px;}

    /* charts */
    .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
    @media(max-width:900px){.charts-grid{grid-template-columns:1fr;}}
    .chart-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow);}
    .chart-title{font-size:15px;font-weight:600;margin-bottom:16px;}
    .chart-wrap{height:260px;position:relative;}

    /* tabs */
    .tabs{display:flex;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:18px;width:fit-content;}
    .tab-btn{padding:8px 22px;border-radius:9px;background:transparent;border:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.2s;}
    .tab-btn.active{background:var(--muted-bg);color:var(--text);}

    /* logs table */
    .table-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
    table{width:100%;border-collapse:collapse;}
    thead tr{background:rgba(57,96,171,.04);border-bottom:1px solid var(--border);}
    th{padding:12px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
    td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border2);}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover{background:rgba(57,96,171,.02);}
    .badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:50px;font-size:11px;font-weight:700;}
    .badge-type{background:var(--primary-light);color:var(--primary);}
    .badge-purpose{background:var(--accent-light);color:#0891b2;}
    .badge-blocked{background:var(--dest-light);color:var(--destructive);}
    .badge-active{background:rgba(16,185,129,.1);color:#059669;}
    .empty-row{text-align:center;padding:48px;color:var(--muted);font-size:13px;}
    .pg-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border2);font-size:12px;color:var(--muted);}
    .pg-btns{display:flex;gap:6px;}
    .pg-btn{padding:5px 12px;background:var(--muted-bg);border:1px solid var(--border);border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:.2s;}
    .pg-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary);}
    .pg-btn:disabled{opacity:.4;cursor:not-allowed;}

    /* users */
    .users-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
    .search-wrap{position:relative;flex:1;min-width:200px;}
    .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted);}
    .search-in{width:100%;padding:9px 12px 9px 34px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:.2s;}
    .search-in:focus{border-color:var(--primary);}
    .btn-icon-only{width:34px;height:34px;border-radius:8px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;color:var(--muted);}
    .btn-icon-only:hover{background:var(--muted-bg);color:var(--text);}
    .btn-icon-only.del:hover{background:var(--dest-light);color:var(--destructive);}
    .btn-icon-only svg{width:16px;height:16px;}

    /* modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
    .modal-bg.open{display:flex;}
    .modal{background:var(--card);border-radius:20px;padding:28px 30px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
    .modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .modal-hd h2{font-size:20px;font-weight:700;}
    .modal-close{background:transparent;border:none;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:.2s;}
    .modal-close:hover{background:var(--muted-bg);color:var(--text);}
    .modal-close svg{width:18px;height:18px;}
    .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .field-grid .full{grid-column:1/-1;}
    .field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
    .field input,.field select{width:100%;padding:10px 12px;background:var(--muted-bg);border:1.5px solid transparent;border-radius:9px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:.2s;}
    .field input:focus,.field select:focus{border-color:var(--primary);background:#eef2ff;}
    .modal-footer{margin-top:20px;display:flex;gap:10px;}
    .modal-footer .btn{flex:1;justify-content:center;border-radius:11px;height:44px;}

    /* settings */
    .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    @media(max-width:800px){.settings-grid{grid-template-columns:1fr;}}
    .settings-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
    .sc-header{padding:16px 20px;background:var(--primary-light);display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
    .sc-header svg{width:18px;height:18px;color:var(--primary);}
    .sc-header h3{font-size:15px;font-weight:700;}
    .sc-header p{font-size:12px;color:var(--muted);}
    .sc-body{padding:20px;}
    .purpose-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--muted-bg);border-radius:10px;margin-bottom:8px;}
    .purpose-item span{font-size:14px;font-weight:500;}
    .add-purpose-row{display:flex;gap:8px;margin-bottom:14px;}
    .add-purpose-row input{flex:1;padding:9px 12px;background:var(--muted-bg);border:1.5px solid transparent;border-radius:9px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:.2s;}
    .add-purpose-row input:focus{border-color:var(--primary);}
    .add-purpose-row button{width:38px;height:38px;background:var(--primary);border:none;border-radius
